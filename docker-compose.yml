services:
  backend:
    build: ./backend
    ports:
      - "8001:8000"
    env_file:
      - ./.env
    volumes:
      - ./backend/data:/app/data
    restart: unless-stopped

  frontend:
    build:
      context: ./frontend
      args:
        NEXT_PUBLIC_BACKEND_URL: http://localhost:8001
    ports:
      - "3001:3000"
    depends_on:
      - backend
    restart: unless-stopped
